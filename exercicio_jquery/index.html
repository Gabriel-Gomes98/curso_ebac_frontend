<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de tarefas</title>
    <link rel="stylesheet" href="/main.css">
</head>
<body>
    <main>
        <h1>Lista de tarefas</h1>
        <form>
            <label for="nome-tarefa">Nome Da Tarefa</label>
            <input id="nome-tarefa" type="text" name="nome-tarefa" placeholder="Nome Da Tarefa" required>
            <button id="botao-cadastrar" type="submit">Cadastrar</button>
            <button id="botao-limpar" type="reset">Limpar</button>
        </form>
        <ul id="lista-de-tarefas">
            
        </ul>
    </main>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/main.js"></script>
</body>
</html>
