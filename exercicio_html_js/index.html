<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário EBAC</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <main>
        <h1>Formulário EBAC</h1>
        <form id="formulario-analise">
            <label for="nome">Nome</label>
            <input id="nome" type="text" name="nome" required placeholder="Nome">
            <p id="aviso"></p>
            <label for="email">Email</label>
            <input id="email" type="email" name="email" required placeholder="Email">
            <label for="numero-a">Digite um número</label>
            <input id="numero-a" type="number" name="numero-a" required placeholder="Campo A - Digite um número">
            <label for="numero-b">Digite um número</label>
            <input id="numero-b" type="number" name="numero-b" required placeholder="Campo B - Digite um número">
            <button id="button-analise" type="submit">Enviar</button>
        </form>
        <p id="mensagem-erro"></p>
        <p class="mensagem-sucesso"></p>
    </main>
    <script src="/scripts.js"></script>
</body>
</html>
